<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0a1628"/>
  <!-- Blue orbit arc left -->
  <path d="M 18 50 A 32 32 0 0 1 50 18" stroke="#2563eb" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Gold orbit arc right with arrow -->
  <path d="M 50 82 A 32 32 0 0 1 82 50" stroke="#f59e0b" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Gold arrow tip -->
  <polygon points="82,44 88,52 76,54" fill="#f59e0b"/>
  <!-- Candlestick 1 -->
  <rect x="35" y="52" width="7" height="18" rx="1" fill="#22d3ee"/>
  <line x1="38.5" y1="48" x2="38.5" y2="52" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="38.5" y1="70" x2="38.5" y2="74" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Candlestick 2 -->
  <rect x="46" y="45" width="7" height="22" rx="1" fill="#06b6d4"/>
  <line x1="49.5" y1="40" x2="49.5" y2="45" stroke="#06b6d4" stroke-width="1.5"/>
  <line x1="49.5" y1="67" x2="49.5" y2="72" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Candlestick 3 -->
  <rect x="57" y="40" width="7" height="26" rx="1" fill="#0891b2"/>
  <line x1="60.5" y1="35" x2="60.5" y2="40" stroke="#0891b2" stroke-width="1.5"/>
  <line x1="60.5" y1="66" x2="60.5" y2="71" stroke="#0891b2" stroke-width="1.5"/>
  <!-- Gold "1" number -->
  <text x="26" y="46" font-family="Arial Black" font-size="22" font-weight="900" fill="#f59e0b">1</text>
</svg>
