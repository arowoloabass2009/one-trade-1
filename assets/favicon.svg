  <polygon points="83,42 91,52 75,54" fill="#f59e0b"/>
  <!-- Gold T -->
  <rect x="44" y="22" width="12" height="40" rx="2" fill="url(#fg)" opacity="0.9"/>
  <rect x="36" y="21" width="28" height="10" rx="2" fill="url(#fg)" opacity="0.9"/>
  <!-- Candles -->
  <rect x="34" y="55" width="7" height="18" rx="1" fill="url(#tg)"/>
  <line x1="37.5" y1="50" x2="37.5" y2="55" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="44" y="48" width="7" height="22" rx="1" fill="url(#tg)"/>
  <line x1="47.5" y1="43" x2="47.5" y2="48" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="54" y="43" width="7" height="26" rx="1" fill="url(#tg)"/>
  <line x1="57.5" y1="37" x2="57.5" y2="43" stroke="#0891b2" stroke-width="1.5"/>
