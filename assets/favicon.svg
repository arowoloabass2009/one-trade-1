<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="One Trade">
  <rect width="100" height="100" rx="20" fill="#070f1e"/>
  <defs>
    <linearGradient id="fv-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="fv-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="fv-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="fv-garco" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>
  <!-- Blue arc -->
  <path d="M 16 50 A 34 34 0 0 1 50 16" stroke="url(#fv-blue)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 50 16 A 34 34 0 0 1 76 34" stroke="#1e3a8a" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Gold arc + arrowhead -->
  <path d="M 26 72 A 34 34 0 0 0 78 40" stroke="url(#fv-garco)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <polygon points="81,33 92,43 76,47" fill="#f59e0b"/>
  <!-- Gold T -->
  <rect x="38" y="22" width="24" height="8" rx="2" fill="url(#fv-gold)"/>
  <rect x="46" y="22" width="8" height="36" rx="2" fill="url(#fv-gold)"/>
  <!-- Candles -->
  <line x1="33" y1="52" x2="33" y2="46" stroke="#5eead4" stroke-width="1.5"/>
  <rect x="29" y="52" width="8" height="16" rx="1" fill="url(#fv-teal)"/>
  <line x1="33" y1="68" x2="33" y2="73" stroke="#0891b2" stroke-width="1.5"/>
  <line x1="44" y1="46" x2="44" y2="39" stroke="#5eead4" stroke-width="1.5"/>
  <rect x="40" y="46" width="8" height="20" rx="1" fill="url(#fv-teal)"/>
  <line x1="44" y1="66" x2="44" y2="72" stroke="#0891b2" stroke-width="1.5"/>
  <line x1="55" y1="40" x2="55" y2="33" stroke="#5eead4" stroke-width="1.5"/>
  <rect x="51" y="40" width="8" height="24" rx="1" fill="url(#fv-teal)"/>
  <line x1="55" y1="64" x2="55" y2="70" stroke="#0891b2" stroke-width="1.5"/>
</svg>
