<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" role="img" aria-label="One Trade — Trade. Invest. Grow.">
  <defs>
    <!-- Gold gradient — T shape and arrow -->
    <linearGradient id="lg-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="40%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <!-- Deep gold for 3D shading -->
    <linearGradient id="lg-gold-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <!-- Blue orbit arc gradient -->
    <linearGradient id="lg-blue-arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e40af"/>
      <stop offset="50%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Gold orbit arc gradient -->
    <linearGradient id="lg-gold-arc" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="60%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Teal candle gradient -->
    <linearGradient id="lg-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5eead4"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- "One" text: blue gradient left to right -->
    <linearGradient id="lg-one-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- "Trade" text: gold -->
    <linearGradient id="lg-trade-text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="50%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Tagline cyan -->
    <linearGradient id="lg-tagline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Glow filter for icon -->
    <filter id="glow-gold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-teal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip circle for icon -->
    <clipPath id="icon-clip">
      <circle cx="88" cy="90" r="72"/>
    </clipPath>
  </defs>

  <!-- ══════════════════════════════════════
       ICON — centered at (88, 90), radius 72
  ══════════════════════════════════════ -->

  <!-- Outer faint ring -->
  <circle cx="88" cy="90" r="70" fill="none"
          stroke="rgba(37,99,235,0.18)" stroke-width="1.5"/>

  <!-- ── BLUE ORBIT ARC — top-left going clockwise to upper-right ── -->
  <!-- Main thick blue arc (outer) -->
  <path d="M 28 90 A 60 60 0 0 1 88 30"
        stroke="url(#lg-blue-arc)" stroke-width="12"
        fill="none" stroke-linecap="round" filter="url(#glow-gold)"/>
  <!-- Thin inner highlight on blue arc -->
  <path d="M 31 90 A 57 57 0 0 1 88 33"
        stroke="rgba(147,197,253,0.4)" stroke-width="3"
        fill="none" stroke-linecap="round"/>

  <!-- Blue arc continues upper right, narrowing -->
  <path d="M 88 30 A 60 60 0 0 1 140 62"
        stroke="#1e3a8a" stroke-width="8"
        fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ── GOLD ORBIT ARC — bottom sweep with arrow ── -->
  <!-- Main gold arc (bottom, going right) -->
  <path d="M 42 122 A 60 60 0 0 0 140 72"
        stroke="url(#lg-gold-arc)" stroke-width="10"
        fill="none" stroke-linecap="round" filter="url(#glow-gold)"/>
  <!-- Thin highlight on gold arc -->
  <path d="M 44 118 A 57 57 0 0 0 137 72"
        stroke="rgba(253,211,77,0.35)" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>

  <!-- Gold arrowhead at tip of gold arc (pointing upper-right ~45°) -->
  <g filter="url(#glow-gold)">
    <polygon points="145,60  162,74  138,80"
             fill="url(#lg-gold)"/>
    <!-- Arrow highlight -->
    <polygon points="145,60  155,68  148,64"
             fill="rgba(255,220,100,0.6)"/>
  </g>

  <!-- ── GOLD "T" LETTERFORM (large, centered in arc) ── -->
  <g filter="url(#glow-gold)">
    <!-- T crossbar (horizontal top) -->
    <rect x="60" y="36" width="54" height="14" rx="3"
          fill="url(#lg-gold)"/>
    <!-- T crossbar dark side for 3D -->
    <rect x="60" y="46" width="54" height="4" rx="0"
          fill="url(#lg-gold-dark)" opacity="0.5"/>
    <!-- T vertical stem -->
    <rect x="78" y="36" width="20" height="58" rx="3"
          fill="url(#lg-gold)"/>
    <!-- T stem dark right side -->
    <rect x="92" y="36" width="6" height="58" rx="0"
          fill="url(#lg-gold-dark)" opacity="0.4"/>
    <!-- Highlight on T top-left corner -->
    <rect x="61" y="37" width="30" height="4" rx="2"
          fill="rgba(255,235,130,0.5)"/>
  </g>

  <!-- ── TEAL CANDLESTICKS (3 candles, rising left to right) ── -->
  <g filter="url(#glow-teal)">
    <!-- Candle 1 — left, shorter -->
    <line x1="55" y1="80" x2="55" y2="72"  stroke="#5eead4" stroke-width="2"/>
    <rect x="50" y="80" width="10" height="24" rx="1.5" fill="url(#lg-teal)"/>
    <line x1="55" y1="104" x2="55" y2="112" stroke="#0891b2" stroke-width="2"/>

    <!-- Candle 2 — middle, taller -->
    <line x1="70" y1="72" x2="70" y2="63"  stroke="#5eead4" stroke-width="2"/>
    <rect x="65" y="72" width="10" height="30" rx="1.5" fill="url(#lg-teal)"/>
    <line x1="70" y1="102" x2="70" y2="110" stroke="#0891b2" stroke-width="2"/>

    <!-- Candle 3 — right, tallest -->
    <line x1="85" y1="66" x2="85" y2="56"  stroke="#5eead4" stroke-width="2"/>
    <rect x="80" y="66" width="10" height="34" rx="1.5" fill="url(#lg-teal)"/>
    <line x1="85" y1="100" x2="85" y2="110" stroke="#0891b2" stroke-width="2"/>

    <!-- Candle highlights -->
    <rect x="50" y="80" width="4" height="6" rx="1" fill="rgba(200,255,250,0.35)"/>
    <rect x="65" y="72" width="4" height="7" rx="1" fill="rgba(200,255,250,0.35)"/>
    <rect x="80" y="66" width="4" height="8" rx="1" fill="rgba(200,255,250,0.35)"/>
  </g>

  <!-- ══════════════════════════════════════
       TEXT — right of icon
  ══════════════════════════════════════ -->

  <!-- "One" — blue gradient, large bold -->
  <text x="178" y="98"
        font-family="'Poppins','Arial Black',Arial,sans-serif"
        font-size="62" font-weight="900" font-style="normal"
        fill="url(#lg-one-text)"
        letter-spacing="-2">One</text>

  <!-- "Trade" — gold gradient, large bold -->
  <text x="308" y="98"
        font-family="'Poppins','Arial Black',Arial,sans-serif"
        font-size="62" font-weight="900" font-style="normal"
        fill="url(#lg-trade-text)"
        letter-spacing="-2">Trade</text>

  <!-- Tagline "TRADE. INVEST. GROW." — cyan, spaced caps -->
  <text x="180" y="130"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="15.5" font-weight="700"
        fill="url(#lg-tagline)"
        letter-spacing="4.5">TRADE. INVEST. GROW.</text>
</svg>
