<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-label="One Trade — Trade. Invest. Grow.">
  <defs>
    <!-- Gold gradient for T arrow and text -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <!-- Blue gradient for "One" text -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Blue-to-gold for "Trade" text -->
    <linearGradient id="tradeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Cyan gradient for tagline -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Blue arc gradient -->
    <linearGradient id="arcBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Gold arc gradient -->
    <linearGradient id="arcGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Candle teal gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ ICON MARK (left side, centered at 78,80) ═══ -->

  <!-- Outer subtle ring -->
  <circle cx="78" cy="80" r="64" fill="none" stroke="rgba(37,99,235,0.15)" stroke-width="1.5"/>

  <!-- Blue arc — top-left sweep -->
  <path d="M 26 80 A 52 52 0 0 1 78 28"
        stroke="url(#arcBlue)" stroke-width="8"
        fill="none" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Blue arc continuation — upper right -->
  <path d="M 78 28 A 52 52 0 0 1 118 58"
        stroke="#1e40af" stroke-width="6"
        fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Gold arc — bottom sweep with arrow -->
  <path d="M 38 108 A 52 52 0 0 0 118 68"
        stroke="url(#arcGold)" stroke-width="8"
        fill="none" stroke-linecap="round"
        filter="url(#goldGlow)"/>

  <!-- Gold arrow head at end of gold arc (pointing upper-right) -->
  <polygon points="122,58 138,68 118,76"
           fill="url(#goldGrad)"
           filter="url(#goldGlow)"/>

  <!-- ── Candlestick 1 (left, shorter) ── -->
  <rect x="52" y="74" width="9" height="26" rx="1.5" fill="url(#tealGrad)"/>
  <line x1="56.5" y1="68" x2="56.5" y2="74" stroke="#22d3ee" stroke-width="2"/>
  <line x1="56.5" y1="100" x2="56.5" y2="106" stroke="#22d3ee" stroke-width="2"/>

  <!-- ── Candlestick 2 (middle, taller) ── -->
  <rect x="65" y="62" width="10" height="34" rx="1.5" fill="url(#tealGrad)"/>
  <line x1="70" y1="55" x2="70" y2="62" stroke="#06b6d4" stroke-width="2"/>
  <line x1="70" y1="96" x2="70" y2="103" stroke="#06b6d4" stroke-width="2"/>

  <!-- ── Candlestick 3 (right, tallest) ── -->
  <rect x="79" y="54" width="10" height="40" rx="1.5" fill="url(#tealGrad)"/>
  <line x1="84" y1="46" x2="84" y2="54" stroke="#0891b2" stroke-width="2"/>
  <line x1="84" y1="94" x2="84" y2="102" stroke="#0891b2" stroke-width="2"/>

  <!-- ── Gold "T" arrow (large, behind candles) ── -->
  <!-- Vertical stem -->
  <rect x="71" y="30" width="14" height="52" rx="2"
        fill="url(#goldGrad)" opacity="0.9" filter="url(#goldGlow)"/>
  <!-- Horizontal top of T -->
  <rect x="56" y="28" width="44" height="13" rx="2"
        fill="url(#goldGrad)" opacity="0.9" filter="url(#goldGlow)"/>

  <!-- ═══ TEXT (right side) ═══ -->

  <!-- "One" in blue gradient -->
  <text x="162" y="82"
        font-family="'Poppins','Arial Black',Arial,sans-serif"
        font-size="52" font-weight="900"
        fill="url(#blueGrad)"
        letter-spacing="-1">One</text>

  <!-- "Trade" in gold -->
  <text x="278" y="82"
        font-family="'Poppins','Arial Black',Arial,sans-serif"
        font-size="52" font-weight="900"
        fill="url(#goldGrad)"
        letter-spacing="-1">Trade</text>

  <!-- "TRADE. INVEST. GROW." tagline in cyan -->
  <text x="163" y="112"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="14" font-weight="700"
        fill="url(#cyanGrad)"
        letter-spacing="4">TRADE. INVEST. GROW.</text>
</svg>
